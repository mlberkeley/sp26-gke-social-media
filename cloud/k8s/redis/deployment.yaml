apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: __NAMESPACE__
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          args: ["--maxmemory", "100mb", "--maxmemory-policy", "allkeys-lru"]
