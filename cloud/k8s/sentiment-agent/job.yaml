apiVersion: batch/v1
kind: Job
metadata:
  name: sentiment-agent-once
  namespace: __NAMESPACE__
  labels:
    app: sentiment-agent
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 7200
  template:
    metadata:
      labels:
        app: sentiment-agent
    spec:
      restartPolicy: Never
      containers:
        - name: sentiment-agent
          image: __IMAGE__
          imagePullPolicy: Always
          env:
            - name: OPENAI_API_KEY
              value: "__OPENAI_API_KEY__"
            - name: TAVILY_API_KEY
              value: "__TAVILY_API_KEY__"
            - name: SENTIMENT_TOPIC
              value: "__SENTIMENT_TOPIC__"
